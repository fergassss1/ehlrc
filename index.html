<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ehlrc</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@8..144,100..1000&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">

    <style>
        :root {
            --md-sys-color-background: #1f1105;
            --md-sys-color-on-background: #eae0d9;
            --md-sys-color-surface: #27190c;
            --md-sys-color-surface-variant: #514438;
            --md-sys-color-on-surface: #eae0d9;
            --md-sys-color-on-surface-variant: #d5c3b5;
            --md-sys-color-primary: #ffb77c;
            --md-sys-color-on-primary: #4f2500;
            --md-sys-color-primary-container: #6f3800;
            --md-sys-color-on-primary-container: #ffdcbe;
            --md-sys-color-outline: #9e8e81;
            --md-shape-corner-medium: 12px;
            --md-shape-corner-full: 9999px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--md-sys-color-background);
            color: var(--md-sys-color-on-background);
            font-family: 'Google Sans Flex', 'Roboto', sans-serif;
            font-size: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 0px;
        }

        .tab-bar {
            display: flex;
            gap: 4px;
            padding-left: 8px;
        }

        .tab-btn {
            background: transparent;
            color: var(--md-sys-color-outline);
            font-family: inherit;
            font-size: 1rem;
            padding: 8px 16px;
            border: none;
            border-radius: var(--md-shape-corner-medium) var(--md-shape-corner-medium) 0 0;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: lowercase;
        }

        .tab-btn.active {
            background-color: var(--md-sys-color-surface);
            color: var(--md-sys-color-primary);
            text-decoration: underline;
            text-underline-offset: 4px;
        }

        .panel {
            background-color: var(--md-sys-color-surface);
            padding: 24px;
            border-radius: var(--md-shape-corner-medium);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .tab-content {
            display: none;
            flex-direction: column;
            gap: 16px;
        }

        .tab-content.active {
            display: flex;
        }

        h2 {
            font-size: 1.5rem;
            font-weight: 400;
            color: var(--md-sys-color-primary);
            letter-spacing: -0.03em;
            text-transform: lowercase;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .input-field {
            background-color: transparent;
            border: 1px solid var(--md-sys-color-outline);
            border-radius: var(--md-shape-corner-medium);
            color: var(--md-sys-color-on-surface);
            font-family: inherit;
            padding: 16px;
            font-size: 1rem;
            outline: none;
        }

        .input-field:focus {
            border-color: var(--md-sys-color-primary);
        }

        textarea.input-field {
            resize: vertical;
            min-height: 120px;
            font-family: monospace;
            font-size: 0.875rem;
        }

        .options-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            font-size: 0.95rem;
            text-transform: lowercase;
        }

        .option-row {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .option-row input {
            accent-color: var(--md-sys-color-primary);
            width: 16px;
            height: 16px;
        }

        .radio-sub-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-left: 24px;
            margin-top: 4px;
        }

        button.btn-primary {
            font-family: inherit;
            font-weight: 500;
            font-size: 0.875rem;
            height: 40px;
            padding: 0 24px;
            border: none;
            background-color: var(--md-sys-color-primary);
            color: var(--md-sys-color-on-primary);
            border-radius: var(--md-shape-corner-full);
            cursor: pointer;
            align-self: flex-start;
            text-transform: lowercase;
        }

        button.btn-primary:disabled {
            opacity: 0.5;
        }

        .status-text {
            font-size: 0.875rem;
            color: var(--md-sys-color-on-surface-variant);
            min-height: 20px;
        }

        .results-box {
            position: relative;
            background-color: var(--md-sys-color-surface-variant);
            border-radius: var(--md-shape-corner-medium);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 300px;
        }

        .results-content {
            padding: 16px;
            overflow-y: auto;
            flex-grow: 1;
            white-space: pre-wrap;
            font-family: monospace;
            font-size: 0.875rem;
            line-height: 1.5;
            color: var(--md-sys-color-on-surface-variant);
        }

        .action-bar {
            position: absolute;
            top: 8px;
            right: 8px;
            display: flex;
            gap: 8px;
            z-index: 10;
        }

        .icon-btn {
            background-color: var(--md-sys-color-surface);
            color: var(--md-sys-color-primary);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: var(--md-shape-corner-full);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="tab-bar">
            <button class="tab-btn active" onclick="switchTabByIndex(0, this)">ttml grabbr</button>
            <button class="tab-btn" onclick="switchTabByIndex(1, this)">insert hat theory</button>
        </div>

        <div class="panel">
            
            <div id="grabbr-tab" class="tab-content active">
                <h2>ehlrc</h2>
                <div class="input-group">
                    <input type="text" id="title" class="input-field" placeholder="the met gala where lady gaga wore the meat dress" autocomplete="off" value="the met gala where lady gaga wore the meat dress">
                    <input type="text" id="artist" class="input-field" placeholder="artist" autocomplete="off" value="stan loona">
                </div>
                <button id="search-btn" class="btn-primary" onclick="fetchRawPayload()">end sombr</button>
                <div id="grabbr-status" class="status-text">ready to manifest</div>
                <div class="results-box">
                    <div class="action-bar">
                        <button class="icon-btn" onclick="copyToClipboard('grabbr-output', 'grabbr-status')">
                            <span class="material-icons-outlined">content_copy</span>
                        </button>
                    </div>
                    <div id="grabbr-output" class="results-content">raw json payload will appear here</div>
                </div>
            </div>

            <div id="magic-tab" class="tab-content">
                <h2>insert hat theory</h2>
                <div class="input-group">
                    <textarea id="raw-json-input" class="input-field" placeholder="paste previous hat theory">zendaya = 7
hat = 3
holland = 7
7+ 7 + 3 = 17
17 letters in “dont forget to smile!”
its all coming together</textarea>
                </div>
                
                <h2>ehlrc format</h2>
                <div class="options-group">
                    <label class="option-row">
                        <input type="checkbox" id="opt-multiperson" checked>
                        <span>multiperson tracking (v1/v2)</span>
                    </label>
                    <div>
                        <span style="color: var(--md-sys-color-on-surface-variant);">bg type</span>
                        <div class="radio-sub-group">
                            <label class="option-row">
                                <input type="radio" name="bg-type" value="inline-tag" checked>
                                <span>[bg:] inline style</span>
                            </label>
                            <label class="option-row">
                                <input type="radio" name="bg-type" value="split-modifier">
                                <span>{bg} suffix style</span>
                            </label>
                        </div>
                    </div>
                </div>
                
                <button class="btn-primary" onclick="processTtmlToEhlrc()">stan loona</button>
                <div id="magic-status" class="status-text">waiting for data transformation...</div>
                <div class="results-box">
                    <div class="action-bar">
                        <button class="icon-btn" onclick="copyToClipboard('magic-output', 'magic-status')">
                            <span class="material-icons-outlined">content_copy</span>
                        </button>
                    </div>
                    <div id="magic-output" class="results-content">output is here</div>
                </div>
            </div>

        </div>
    </div>

<script>
    const endpoints = [
        "https://lyrics.geeked.wtf",
        "https://lyricsplus.prjktla.my.id",
        "https://lyricsplus.atomix.one",
        "https://lyricsplus.binimum.org",
        "https://lyricsplus.prjktla.workers.dev",
        "https://lyricsplus-seven.vercel.app"
    ];

    function switchTabByIndex(idx, btnElement) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        
        const targets = ['grabbr-tab', 'magic-tab'];
        document.getElementById(targets[idx]).classList.add('active');
        btnElement.classList.add('active');
    }

    function toLrcTimestamp(msInput) {
        if (msInput === undefined || msInput === null) return "00:00.000";
        let totalSeconds = parseFloat(msInput) / 1000;
        if (isNaN(totalSeconds) || totalSeconds < 0) totalSeconds = 0;
        
        const mins = Math.floor(totalSeconds / 60);
        const secs = Math.floor(totalSeconds % 60);
        const ms = Math.floor((totalSeconds % 1) * 1000);
        
        return `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}.${String(ms).padStart(3, '0')}`;
    }

    async function fetchRawPayload() {
        const title = encodeURIComponent(document.getElementById('title').value.trim());
        const artist = encodeURIComponent(document.getElementById('artist').value.trim());
        const output = document.getElementById('grabbr-output');
        const status = document.getElementById('grabbr-status');
        const searchBtn = document.getElementById('search-btn');

        if (!title) {
            status.textContent = "ERROR: INPUT CODE CONTAINER IS EMPTY";
            return;
        }

        status.textContent = "analyzing the zendaya hat theory...";
        output.textContent = "";
        searchBtn.disabled = true;

        for (const base of endpoints) {
            const url = `${base}/v1/lyrics/get?title=${title}&artist=${artist}`;
            try {
                status.textContent = `trying mirror: ${new URL(base).hostname}`;
                const response = await fetch(url);
                if (response.ok) {
                    const data = await response.json();
                    if (data) {
                        const formatted = JSON.stringify(data, null, 2);
                        output.textContent = formatted;
                        status.textContent = `found via ${new URL(base).hostname}`;
                        searchBtn.disabled = false;
                        
                        document.getElementById('raw-json-input').value = formatted;
                        return;
                    }
                }
            } catch (e) {
                console.error(e);
            }
        }

        status.textContent = "could not find raw data on any mirror";
        output.textContent = "no results found";
        searchBtn.disabled = false;
    }

    function processTtmlToEhlrc() {
        let jsonText = document.getElementById('raw-json-input').value.trim();
        const output = document.getElementById('magic-output');
        const status = document.getElementById('magic-status');
        const useMultiperson = document.getElementById('opt-multiperson').checked;
        const bgStyle = document.querySelector('input[name="bg-type"]:checked').value;

        if (!jsonText || jsonText.startsWith("zendaya = 7")) {
            status.textContent = "ERROR: INPUT CONTAINER CONTAINS CONSPIRACY THEORIES, NOT JSON";
            return;
        }

        let payload;
        try {
            payload = JSON.parse(jsonText);
        } catch (err) {
            try {
                let repairedText = jsonText.replace(/,\s*\"?[a-zA-Z0-9_\-]*\"?\s*:\s*$/g, '').trim();
                if (repairedText.endsWith('{') || repairedText.endsWith(',')) {
                    repairedText = repairedText.substring(0, repairedText.length - 1).trim();
                }
                if (!repairedText.includes(']')) repairedText += ']';
                if (!repairedText.includes('}')) repairedText += '}';
                payload = JSON.parse(repairedText);
                status.textContent = "recovered incomplete layout safely!";
            } catch (recoveryErr) {
                status.textContent = "MALFORMED TEXT PARSING ERROR: " + err.message;
                return;
            }
        }

        try {
            let rawLyricsArray = [];
            if (payload.lyrics && Array.isArray(payload.lyrics)) {
                rawLyricsArray = payload.lyrics;
            } else if (Array.isArray(payload)) {
                rawLyricsArray = payload;
            } else {
                status.textContent = "UNRECOGNIZED SCHEMA TREE PATTERN";
                return;
            }

            let processedLines = [];
            let currentLineWords = [];

            rawLyricsArray.forEach(item => {
                if (!item) return;
                
                if (item.time === undefined || item.time === null || !item.text) {
                    return; 
                }

                currentLineWords.push(item);
                if (item.isLineEnding === 1) {
                    const fullLineString = currentLineWords.map(w => w.text).join('').trim();
                    
                    if (fullLineString.includes('/') && !fullLineString.includes(' / ')) {
                        currentLineWords = [];
                        return;
                    }

                    processedLines.push(currentLineWords);
                    currentLineWords = [];
                }
            });
            
            if (currentLineWords.length > 0) {
                const finalLineString = currentLineWords.map(w => w.text).join('').trim();
                if (!(finalLineString.includes('/') && !finalLineString.includes(' / '))) {
                    processedLines.push(currentLineWords);
                }
            }

            let syncedLyrics = "";

            processedLines.forEach(lineItems => {
                if (lineItems.length === 0) return;

                let mainVocals = [];
                let backgroundVocals = [];

                lineItems.forEach(item => {
                    const isBg = item.element && (item.element.isBackground || item.element.songPart === "Background");
                    if (isBg) backgroundVocals.push(item); else mainVocals.push(item);
                });

                if (mainVocals.length > 0) {
                    syncedLyrics += `[${toLrcTimestamp(mainVocals[0].time)}]`;
                    if (useMultiperson) {
                        const singer = (mainVocals[0].element && mainVocals[0].element.singer) ? mainVocals[0].element.singer : "v1";
                        syncedLyrics += (singer === "v2" || singer === "voice2") ? "v2:" : "v1:";
                    }
                    mainVocals.forEach(syllable => {
                        syncedLyrics += `<${toLrcTimestamp(syllable.time)}>${syllable.text}<${toLrcTimestamp(syllable.time + (syllable.duration || 0))}>`;
                    });
                }

                if (backgroundVocals.length > 0) {
                    if (bgStyle === "inline-tag") {
                        syncedLyrics += "\n[bg:";
                        backgroundVocals.forEach(syllable => {
                            let cleanText = syllable.text.replace(/[\(\)\[\]]/g, '');
                            syncedLyrics += `<${toLrcTimestamp(syllable.time)}>${cleanText}<${toLrcTimestamp(syllable.time + (syllable.duration || 0))}>`;
                        });
                        syncedLyrics += "]";
                    } else {
                        syncedLyrics += `\n[${toLrcTimestamp(backgroundVocals[0].time)}]{bg}`;
                        backgroundVocals.forEach(syllable => {
                            syncedLyrics += `<${toLrcTimestamp(syllable.time)}>${syllable.text}<${toLrcTimestamp(syllable.time + (syllable.duration || 0))}>`;
                        });
                    }
                }
                syncedLyrics += "\n";
            });

            output.textContent = syncedLyrics.trim();
            if (status.textContent !== "recovered incomplete layout safely!") {
                status.textContent = "transformation process complete";
            }
        } catch (err) {
            status.textContent = "PROCESSING ERROR: " + err.message;
        }
    }

    function copyToClipboard(contentElementId, statusElementId) {
        const text = document.getElementById(contentElementId).textContent;
        const status = document.getElementById(statusElementId);
        const bad = ["raw json payload will appear here", "output is here", "no results found"];
        
        if (text && !bad.includes(text)) {
            navigator.clipboard.writeText(text).then(() => {
                const current = status.textContent;
                status.textContent = "copied to clipboard";
                setTimeout(() => { status.textContent = current; }, 2000);
            });
        }
    }
</script>
</body>
</html>
